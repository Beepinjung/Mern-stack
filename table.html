<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        td:nth-child(2n) {
            background-color: lightblue;
        }
    </style>
</head>
<!-- can also make thead like thead tbody etc -->
<body>
    <h1>This is a simple table</h1>
    <table border="2" cellpadding="15" cellspacing="5">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Address</th>
            <th colspan="2">Email</th>
            <th>Province</th>
        </tr>
        <!-- colspan="" for merging rows like ---- > this way -->
        <tr>
            <td>John Doe</td>
            <td>30</td>
            <td>123 Main St, Anytown, USA</td>
            <td>john.doe@example.com</td>
            <td>jhdfgbsaghv@gmail.com</td>
            <td rowspan="2">koshi</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>25</td>
            <td>456 Elm St, Othertown, USA</td>
            <td colspan="2">jdfhvbdfsjhb@gmail.com</td>
            
    </table>
</body>
