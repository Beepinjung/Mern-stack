<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="#" method="post">
        <label for="name">Name:</label><br>
        <input type="text" class="control"id="name" name="name"><br>
        <label for="age">Age:</label><br>
        <input type="number" class="control" id="age" name="age"><br>
        <label for="email">Email:</label><br>
        <input type="email" class="control" id="email" name="email"><br>
        Hobbies:
        <input type="checkbox" class="checkbox" name="hobbies[]" value="Reading"> Reading

        <input type="checkbox" class="checkbox" name="hobbies[]" value="Swimming"> Swimming
        <input type="checkbox" class="checkbox" name="hobbies[]" value="Coding"> Coding
        <br><br>
        Gender:
        <input type="radio" class="radio" name="gender" value="Male">Male
        <input type="radio" class="radio" name="gender" value="Female">Female
        <input type="radio" class="radio" name ="gender" value="Other">Other
        <br><br>

        <input type="date" name="dob" id="dob"><br><br>
        <input type="range" name="range" id="range"><br><br>
        <input type="color" name="color" id="color"><br><br>
        <select name="Class" id="class">
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="3">Class 3</option>
        </select>
        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
