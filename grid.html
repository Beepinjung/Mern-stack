<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 1px solid rgb(10, 10, 10);
            display: grid;
            /* grid-template-columns:repeat(auto-fit, minmax(150px, auto)); */
            grid-template-columns: 1fr 2fr 2.5fr 1fr; 
            grid-template-areas: "box1 box2 box8"
            ". box3 ."
            ". . box5";
            gap: 20px;
        }
        .box1, .box2, .box3, .box4, .box5, .box6, .box7, .box8{
            border: 1px solid rgb(10, 10, 10);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
        }
        .box1{
            height: 200px;
            grid-area: box1;
        }
        .box2{
            grid-area: box2;
        }
        .box3{
            grid-area: box3;
        }
        .box4{
            grid-area: box4;
        }
        .box5{
            grid-area: box5;
        }

        .box6{
            grid-area: box6;
        }
        .box7{
            grid-area: box7;
        }
        .box8{
            grid-area: box8;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1">
            box1
        </div>
        <div class="box2">
            box2
        </div>
        <div class="box3">
            box3
        </div>
        <div class="box4">
            box4
        </div>
        <div class="box5">
            box5
        </div>
        <div class="box6">
            box6
        </div>
        <div class="box7">
            box7    
        </div>
        <div class="box8">
            box8
        </div>
    </div>
</body>
</html>
